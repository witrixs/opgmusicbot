<div class="sidebar" [class.open]="isOpen">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <img src="assets/icons/icon-152x152.png" alt="OPGMusic Logo" class="logo-img">
      </div>
      <div class="logo-text">
        <div class="logo-title">OPGMusic</div>
        <div class="logo-version">
          <ng-container *ngIf="versionState?.hasUpdate && versionState?.latestVersion">
            <a class="logo-version-link" [href]="versionState?.releaseUrl || 'https://github.com/witrixs/opgmusicbot/releases'" target="_blank" rel="noopener noreferrer" [attr.title]="'Требуется обновление до v' + (versionState?.latestVersion ?? '')">Требуется обновление</a>
          </ng-container>
          <ng-container *ngIf="!versionState || !versionState.hasUpdate || versionState.isLoading">
            <span *ngIf="versionState?.isLoading">...</span>
            <span *ngIf="!versionState || !versionState.isLoading">v{{ (versionState?.currentVersion) || fallbackVersion }}</span>
          </ng-container>
        </div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Платформа</div>
      <ul class="nav-list">
        <li *ngFor="let item of menuItems" class="nav-item" [class.active]="isActiveRoute(item.route)">
          <a [routerLink]="item.route" class="nav-link" (click)="onLinkClick()">
            <span class="nav-icon">
              <svg *ngIf="item.icon === 'dashboard'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
              <svg *ngIf="item.icon === 'music'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
              </svg>
              <svg *ngIf="item.icon === 'queue'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>
              <svg *ngIf="item.icon === 'settings'" class="icon-settings" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </span>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-section">
      <div class="nav-section-title">Сообщество</div>
      <ul class="nav-list">
        <li class="nav-item">
          <a href="https://github.com/witrixs/opgmusicbot" class="nav-link" (click)="onLinkClick()">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>
            </span>
            <span class="nav-label">Документация</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="https://github.com/witrixs" class="nav-link" (click)="onLinkClick()">
            <span class="nav-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </span>
            <span class="nav-label">Поддержка</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-menu">
      <button class="user-info" type="button" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <img *ngIf="user?.avatar" class="user-avatar-img" [src]="user?.avatar" [alt]="user?.username || 'User'" />
          <span *ngIf="!user?.avatar" class="user-avatar-fallback">{{ (user?.username?.[0] || 'U') }}</span>
        </div>
        <div class="user-details">
          <div class="user-name">{{ user?.username || 'User' }}</div>
          <div class="user-status">Online</div>
        </div>
        <span class="user-caret" [class.open]="userMenuOpen" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </span>
      </button>

      <div class="user-menu-panel" [class.open]="userMenuOpen" (click)="$event.stopPropagation()">
        <button type="button" class="user-menu-item danger" (click)="openLogoutModal()">
          Выйти
        </button>
      </div>
    </div>
  </div>
</div>

<app-confirm-modal
  [open]="logoutModalOpen"
  title="Выйти из аккаунта?"
  message="Вы уверены, что хотите выйти из панели управления?"
  confirmText="Выйти"
  cancelText="Отмена"
  [danger]="true"
  (confirm)="confirmLogout()"
  (cancel)="closeLogoutModal()"
></app-confirm-modal>
