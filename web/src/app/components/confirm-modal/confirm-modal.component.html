<div class="modal-backdrop" *ngIf="open" (click)="onBackdropClick()">
  <div class="modal" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">{{ title }}</div>
      <button class="btn-icon" type="button" (click)="onCancel()" [disabled]="loading" aria-label="Закрыть">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="modal-message">{{ message }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" type="button" (click)="onCancel()" [disabled]="loading">
        {{ cancelText }}
      </button>
      <button class="btn-primary" [class.danger]="danger" type="button" (click)="onConfirm()" [disabled]="loading">
        <span *ngIf="!loading">{{ confirmText }}</span>
        <span *ngIf="loading">...</span>
      </button>
    </div>
  </div>
</div>
