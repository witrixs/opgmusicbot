<div class="toast-wrap" *ngIf="data">
  <div class="toast" role="alert">
    <div class="toast-header">
      <span class="toast-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </span>
      <span class="toast-title">Требуется обновление</span>
      <button type="button" class="toast-close" (click)="dismiss()" aria-label="Закрыть">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <p class="toast-message">
      Доступна новая версия <strong>v{{ data.latestVersion }}</strong>. Подключитесь по SSH к серверу и выполните команду:
    </p>
    <div class="toast-actions">
      <code class="toast-command">opgbot update</code>
      <button type="button" class="toast-copy-btn" (click)="copyCommand()">Копировать</button>
    </div>
    <a *ngIf="data.releaseUrl" [href]="data.releaseUrl" target="_blank" rel="noopener noreferrer" class="toast-link">
      Открыть страницу релиза →
    </a>
  </div>
</div>
