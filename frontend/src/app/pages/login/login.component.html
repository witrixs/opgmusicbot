<div class="login">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-row">
        <div class="brand-icon" aria-hidden="true">
          <img src="assets/icons/icon-152x152.png" alt="OPGMusic Logo" class="brand-icon-img">
        </div>
        <div class="brand-text">
          <div class="brand-title">OPGMusic</div>
          <div class="brand-subtitle">Вход в панель управления</div>
        </div>
      </div>
    </div>

    <div class="login-error" *ngIf="error">
      Ошибка авторизации. Попробуйте ещё раз.
    </div>

    <button class="btn-discord" (click)="loginWithDiscord()">
      <svg
        class="discord-icon"
        width="20"
        height="20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        aria-hidden="true"
        focusable="false"
      >
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M13.225 15.794c.455.572 1.001 1.237 1.001 1.237 3.178-.103 4.489-2.106 4.618-2.304l.01-.015c0-4.933-2.184-8.937-2.184-8.937-2.17-1.655-4.25-1.608-4.25-1.608l-.212.247c2.58.789 3.779 1.948 3.779 1.948a12.447 12.447 0 0 0-4.568-1.468 12.603 12.603 0 0 0-3.065.03c-.08 0-.148.012-.224.026l-.034.005c-.531.062-1.821.248-3.445.974-.562.248-.895.433-.895.433S5 5.141 7.73 4.352l-.151-.185S5.516 4.12 3.33 5.775c0 0-2.184 4.004-2.184 8.937 0 0 1.274 2.226 4.628 2.334 0 0 .561-.68 1.017-1.268-1.928-.587-2.656-1.809-2.656-1.809s.152.109.425.263c.01 0 .019.006.032.014a.335.335 0 0 0 .029.017c.022.016.045.027.068.039a8.818 8.818 0 0 0 1.176.564 11.39 11.39 0 0 0 2.23.665c1.139.216 2.474.294 3.931.015.713-.139 1.442-.34 2.2-.664a8.621 8.621 0 0 0 1.746-.913s-.76 1.253-2.747 1.825Zm-.516-5.922c-.865 0-1.548.758-1.548 1.7 0 .944.698 1.702 1.548 1.702.865 0 1.548-.758 1.548-1.701 0-.943-.698-1.7-1.548-1.7Zm-5.539 0c-.865 0-1.548.758-1.548 1.7 0 .944.698 1.702 1.548 1.702.865 0 1.548-.758 1.548-1.701.015-.943-.683-1.7-1.548-1.7Z"
          fill="#fff"
        ></path>
      </svg>
      Войти через Discord
    </button>

    <div class="login-note">
      Авторизация OPGMusic bot.
    </div>
  </div>
</div>
